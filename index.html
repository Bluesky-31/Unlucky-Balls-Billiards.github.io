<script>
// ── Difficulty ────────────────────────────────────────────────────────────
const DIFF_DESCS = {
  easy: 'Extra time (+50%) and fewer balls (-20%) per level.',
  normal: 'Normal speed. Standard ball count per level.',
  hard: 'Same time but 20% more balls per level. Good luck.'
};
const DIFF_LABELS = { easy:'EZ', normal:'NRM', hard:'HRD' };

// ── Settings state ─────────────────────────────────────────────────────────
const FELT_COLORS = {
  green: { c0:'#2e8b4a', c1:'#236b3a', c2:'#1a5230' },
  blue: { c0:'#2060b0', c1:'#1a4d90', c2:'#103568' },
  black: { c0:'#3a3a3a', c1:'#262626', c2:'#141414' },
  pink: { c0:'#c03870', c1:'#9b2d60', c2:'#721f48' },
  red: { c0:'#aa2828', c1:'#882020', c2:'#601515' },
};
const CUE_COLORS = {
  classic: { tip:'#f5d06e', mid:'#c8a84b', butt:'#5c3317' },
  white: { tip:'#f0f0f0', mid:'#cccccc', butt:'#888888' },
  black: { tip:'#666666', mid:'#333333', butt:'#111111' },
  blue: { tip:'#8ac8f8', mid:'#4a8acc', butt:'#1a3d6b' },
  red: { tip:'#f88888', mid:'#cc4a4a', butt:'#7a1a1a' },
  gold: { tip:'#ffd700', mid:'#daa520', butt:'#8b6914' },
};

let settings = {
  timer: true,
  ballpath: true,
  suddendeath: false,
  earlybombs: false,
  mobile: true,
  felt: 'green',
  cue: 'classic',
  flowers: false,
  skulls: false,
};

try {
  const saved = JSON.parse(localStorage.getItem('bb_settings')||'{}');
  Object.assign(settings, saved);
} catch(e){}

function saveSetting(key, val) {
  settings[key] = val;
  try { localStorage.setItem('bb_settings', JSON.stringify(settings)); } catch(e){}
}

function applyMobileMode() {
  BALL_R = settings.mobile ? 12 : 23;
  const lbl = document.getElementById('mobile-label');
  const cb = document.getElementById('home-mobile');
  if(lbl){
    lbl.textContent = settings.mobile ? '📱 MOBILE MODE' : '🖥 COMPUTER MODE';
    lbl.style.color = settings.mobile ? '#ff6b00' : '#aaaaff';
  }
  if(cb) cb.checked = !settings.mobile;
}

function toggleMobile(checked) {
  settings.mobile = !checked;
  saveSetting('mobile', settings.mobile);
  applyMobileMode();
}

function onDesignToggle(key, val) {
  if (val) {
    if (key === 'flowers') { settings.skulls = false; document.getElementById('set-skulls').checked = false; }
    if (key === 'skulls') { settings.flowers = false; document.getElementById('set-flowers').checked = false; }
  }
  saveSetting(key, val);
}

function openSettings() {
  document.getElementById('set-timer').checked = settings.timer;
  document.getElementById('set-ballpath').checked = settings.ballpath;
  document.getElementById('set-suddendeath').checked = settings.suddendeath;
  document.getElementById('set-earlybombs').checked = settings.earlybombs;
  document.getElementById('set-flowers').checked = settings.flowers;
  document.getElementById('set-skulls').checked = settings.skulls;
  document.querySelectorAll('[data-felt]').forEach(el => el.classList.toggle('active', el.dataset.felt === settings.felt));
  document.querySelectorAll('[data-cue]').forEach(el => el.classList.toggle('active', el.dataset.cue === settings.cue));
  document.getElementById('home').classList.add('hidden');
  document.getElementById('settings').classList.remove('hidden');
}

function closeSettings() {
  document.getElementById('settings').classList.add('hidden');
  document.getElementById('home').classList.remove('hidden');
}

function setFelt(name) {
  settings.felt = name;
  saveSetting('felt', name);
  document.querySelectorAll('[data-felt]').forEach(el => el.classList.toggle('active', el.dataset.felt === name));
}

function setCue(name) {
  settings.cue = name;
  saveSetting('cue', name);
  document.querySelectorAll('[data-cue]').forEach(el => el.classList.toggle('active', el.dataset.cue === name));
}

let difficulty = 'normal';

function selectDiff(d) {
  difficulty = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('d-'+d).classList.add('active');
  document.getElementById('home-desc').textContent = DIFF_DESCS[d];
}

function launchGame() {
  document.getElementById('home').classList.add('hidden');
  document.getElementById('s-diff').textContent = DIFF_LABELS[difficulty];

  if (difficulty === 'easy') {
    settings.ballpath = true;
    settings.suddendeath = false;
  } else {
    settings.ballpath = false;
    settings.suddendeath = true;
  }

  G.score = 0; 
  G.level = 1;
  G.lives = difficulty === 'easy' ? 3 : difficulty === 'hard' ? 1 : 2;
  updateLivesDisplay();
  startLevel();
}

function goHome() {
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('home').classList.remove('hidden');
  G.phase = 'idle';
  G.cue = null; 
  G.balls = [];
}

function updateLivesDisplay() {
  const el = document.getElementById('s-lives');
  if(!el) return;
  el.textContent = '❤️'.repeat(Math.max(0, G.lives));
  el.style.color = G.lives <= 1 ? '#ff2a2a' : '#ff6b00';
}

// ── Level data ────────────────────────────────────────────────────────────
const MAX_LEVEL = 10;

function getLevelData(lvl) {
  const capped = Math.min(lvl, MAX_LEVEL) - 1;
  let n, t;
  if (difficulty === 'easy') {
    n = 3 + capped;
    t = 70 + capped * 10;
  } else if (difficulty === 'hard') {
    n = 5 + capped;
    t = 70 + capped * 8;
  } else {
    n = 4 + capped;
    t = 70 + capped * 9;
  }
  const hasBombs = true;
  let numEarlyDanger = 0;
  if (settings.earlybombs) {
    if (difficulty === 'easy') {
      if (lvl >= 3) numEarlyDanger = 1;
      if (lvl >= 7) numEarlyDanger = 2;
      if (lvl >= 10) numEarlyDanger = 3;
    } else if (difficulty === 'hard') {
      if (lvl >= 1) numEarlyDanger = 1;
      if (lvl >= 4) numEarlyDanger = 2;
      if (lvl >= 7) numEarlyDanger = 3;
      if (lvl >= 10) numEarlyDanger = 4;
    } else {
      if (lvl >= 2) numEarlyDanger = 1;
      if (lvl >= 7) numEarlyDanger = 2;
      if (lvl >= 10) numEarlyDanger = 3;
    }
  }
  return { n, t, hasBombs, numEarlyDanger };
}

// ── Table geometry ────────────────────────────────────────────────────────
let T = {};
function buildTable() {
  const W = canvas.width, H = canvas.height;
  const RAIL = 30, WOOD = 16;
  const isPortrait = H > W;
  const tw = W, th = H;
  const ox = 0, oy = 0;
  const ix = ox+RAIL, iy = oy+RAIL, iw = tw-RAIL*2, ih = th-RAIL*2;
  const PR = settings.mobile ? 19 : 58;
  T = { ox,oy,ow:tw,oh:th, ix,iy,iw,ih, rail:RAIL,wood:WOOD,pr:PR,
        left:ix, right:ix+iw, top:iy, bottom:iy+ih, isPortrait };

  const PRC = PR, PRS = PR;
  const CO = Math.round(PRC * 0.35);

  if (isPortrait) {
    T.pockets = [
      {x:T.ix+CO, y:T.iy+CO, r:PRC},
      {x:T.ix+T.iw-CO, y:T.iy+CO, r:PRC},
      {x:T.ix, y:T.iy+T.ih/2, r:PRS},
      {x:T.ix+T.iw, y:T.iy+T.ih/2, r:PRS},
      {x:T.ix+CO, y:T.iy+T.ih-CO, r:PRC},
      {x:T.ix+T.iw-CO, y:T.iy+T.ih-CO, r:PRC},
    ];
  } else {
    T.pockets = [
      {x:T.ix+CO, y:T.iy+CO, r:PRC},
      {x:T.ix+T.iw/2, y:T.iy, r:PRS},
      {x:T.ix+T.iw-CO, y:T.iy+CO, r:PRC},
      {x:T.ix+CO, y:T.iy+T.ih-CO, r:PRC},
      {x:T.ix+T.iw/2, y:T.iy+T.ih, r:PRS},
      {x:T.ix+T.iw-CO, y:T.iy+T.ih-CO, r:PRC},
    ];
  }
}

// ── Canvas setup ──────────────────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const spinCv = document.getElementById('spin-canvas');
const sCtx = spinCv.getContext('2d');
const wrap = document.getElementById('canvas-wrap');

function resizeCanvas() {
  const w = wrap.clientWidth || wrap.offsetWidth;
  const h = wrap.clientHeight || wrap.offsetHeight;
  if(w > 0 && h > 0){
    canvas.width = w;
    canvas.height = h;
    buildTable();
  }
}

window.addEventListener('resize', resizeCanvas);

// ── Game constants ────────────────────────────────────────────────────────
const BCOLORS = ['#f5c518','#2255cc','#ee2222','#7b2fbe','#ff8800','#228b22','#8b2500','#111111','#ddbb00','#1177cc','#cc2244','#116611','#aa4400','#333333'];
let BALL_R = 23;
const FRICTION = 0.983;
const MIN_SPD = 0.25;

let G = {
  balls:[], cue:null, phase:'idle',
  aimAngle:Math.PI, power:72,
  spinX:0, spinY:0,
  score:0, level:1, combo:0,
  lives:3,
  particles:[], shake:0,
  explosion:null,
};

// ── Ball placement ────────────────────────────────────────────────────────
function placeBalls(n, lvl, hasBombs) {
  // ... (keeping your original placement logic - it's fine)
  const balls = [];
  const cueX = G.cue.x, cueY = G.cue.y;
  const pattern = ((lvl - 1) % 6);
  const candidates = generateCandidates(n, pattern, cueX, cueY);

  for (let i = 0; i < candidates.length && balls.length < n; i++) {
    const {x,y} = candidates[i];
    if (Math.hypot(x-cueX, y-cueY) < 65) continue;
    if (balls.some(b => Math.hypot(x-b.x, y-b.y) < BALL_R*2.6)) continue;
    if (T.pockets.some(p => Math.hypot(x-p.x, y-p.y) < T.pr*1.4)) continue;
    if (x < T.left+BALL_R*2 || x > T.right-BALL_R*2) continue;
    if (y < T.top+BALL_R*2 || y > T.bottom-BALL_R*2) continue;
    balls.push({x,y});
  }

  let safety = 0;
  while (balls.length < n && safety++ < 600) {
    const x = T.ix + BALL_R*2 + Math.random()*(T.iw - BALL_R*4);
    const y = T.iy + BALL_R*2 + Math.random()*(T.ih - BALL_R*4);
    if (Math.hypot(x-cueX, y-cueY) < 65) continue;
    if (balls.some(b => Math.hypot(x-b.x, y-b.y) < BALL_R*2.6)) continue;
    if (T.pockets.some(p => Math.hypot(x-p.x, y-p.y) < T.pr*1.4)) continue;
    balls.push({x,y});
  }
  return balls;
}

function generateCandidates(n, pattern, cueX, cueY) {
  // ... your original function (unchanged for now)
  const pts = [];
  const cx = (T.ix+T.right)/2, cy = (T.iy+T.bottom)/2;
  const hw = T.iw/2 - BALL_R*3, hh = T.ih/2 - BALL_R*3;
  // ... (rest of your generateCandidates code remains the same)
  // I'll keep it short here - copy your original if needed
  return pts; // placeholder - use your full version
}

// ── Start level ───────────────────────────────────────────────────────────
function startLevel() {
  document.getElementById('overlay').classList.add('hidden');
  resizeCanvas();
  const lvl = getLevelData(G.level);
  G.balls=[]; G.particles=[]; G.combo=0; G.explosion=null; G.phase='idle'; 
  updateLivesDisplay();

  G.cue = T.isPortrait
    ? {x:T.ix+Math.round(T.iw/2), y:T.iy+Math.round(T.ih*0.75), vx:0,vy:0,r:BALL_R}
    : {x:T.ix+Math.round(T.iw*0.25),y:T.iy+Math.round(T.ih/2), vx:0,vy:0,r:BALL_R};

  const positions = placeBalls(lvl.n, G.level, lvl.hasBombs);

  const baseDanger = G.level >= 4 ? Math.min(Math.floor(lvl.n / 2), G.level - 3) : 0;
  const numDanger = Math.min(lvl.n - 1, Math.max(baseDanger, lvl.numEarlyDanger));
  const dangerIndices = new Set();
  while (dangerIndices.size < numDanger) {
    dangerIndices.add(Math.floor(Math.random() * lvl.n));
  }

  positions.forEach((pos,i) => {
    const isBomb = lvl.hasBombs;
    const isDanger = dangerIndices.has(i);
    const tv = lvl.t + (Math.random()-0.5)*4;
    const br = isDanger ? BALL_R * 2 : BALL_R;

    G.balls.push({
      x:pos.x, y:pos.y, vx:0,vy:0, r:br,
      color: isDanger ? '#111111' : BCOLORS[i % BCOLORS.length],
      isBomb, isDanger,
      timer:tv, maxTimer:tv, id:i,
      potted:false, exploded:false,
      ph:Math.random()*Math.PI*2,
      fuseAngle: Math.random()*Math.PI*2
    });
  });

  G.phase='aiming';
  refreshStrip();
}

// ── Timer & Explosion Fixes ───────────────────────────────────────────────
function tickTimers(dt) {
  if (!settings.timer) return;
  if (G.phase !== 'aiming' && G.phase !== 'rolling') return;

  for (const b of G.balls) {
    if (b.potted || b.exploded || !b.isBomb) continue;

    b.timer -= dt;

    if (b.timer <= 0) {
      console.log(`Bomb ${b.id} exploded on timer!`);
      explodeBall(b);
      return; // prevent multiple explosions in one frame
    }
  }
}

function explodeBall(b) {
  if (b.exploded) return;
  b.exploded = true;
  console.log(`Exploding bomb at (${Math.round(b.x)}, ${Math.round(b.y)})`);
  triggerLoss(b.x, b.y);
}

function triggerLoss(x, y) {
  if (G.phase === 'exploding') return;

  console.log('=== TRIGGER LOSS ACTIVATED ===');

  G.phase = 'exploding';
  G.shake = 1.4;

  const spd = settings.mobile ? 7 : 14;
  const cnt = settings.mobile ? 80 : 150;

  for(let i=0; i<cnt; i++){
    const a=Math.random()*Math.PI*2, s=1+Math.random()*spd;
    const debris = Math.random()<0.3;
    G.particles.push({
      x, y, 
      vx:Math.cos(a)*s, 
      vy:Math.sin(a)*s*(0.4+Math.random()*0.6),
      life:0.6+Math.random()*0.4,
      r: debris ? 3+Math.random()*7 : 1.5+Math.random()*4,
      color: debris ? (Math.random()<0.5?'#331100':'#221100') 
                    : (['#ff6600','#ff9900','#ffcc00','#ff3300','#ffff80','#ffffff'][Math.floor(Math.random()*6)])
    });
  }

  G.explosion = { x, y, t:0, maxT:2.2 };

  setTimeout(() => {
    G.lives--;
    updateLivesDisplay();

    if(G.lives <= 0){
      showRankings(false);
    } else {
      G.explosion = null;
      G.phase = 'idle';
      const overlay = document.getElementById('overlay');
      overlay.classList.remove('hidden');
      document.getElementById('ov-title').innerHTML = '💔 UNLUCKY!';
      document.getElementById('ov-title').style.color = '#ff2a2a';
      document.getElementById('ov-sub').innerHTML = 
        G.lives + ' life' + (G.lives>1?'s':'') + ' remaining — retry this level?';
      const nextBtn = document.getElementById('ov-next');
      nextBtn.textContent = 'RETRY';
      nextBtn.onclick = startLevel;
    }
  }, 2400);
}

// ── Main loop ──────────────────────────────────────────────────────────────
let lastTs = 0;
function loop(ts){
  const dt = Math.min((ts - lastTs)/1000, 0.05);
  lastTs = ts;

  if(G.phase !== 'exploding') physics();
  tickTimers(dt);
  tickParticles(dt);

  if(G.shake > 0) G.shake -= dt;
  if(G.explosion) G.explosion.t = Math.min(G.explosion.t + dt, G.explosion.maxT);

  // ... rest of your drawing code (drawTable, drawBalls, drawAimLine, etc.)

  requestAnimationFrame(loop);
}

// Initialize
applyMobileMode();
applyLayout();
window.addEventListener('resize', () => { applyLayout(); resizeCanvas(); });

requestAnimationFrame(() => {
  resizeCanvas();
  requestAnimationFrame(ts => {
    lastTs = ts;
    requestAnimationFrame(loop);
  });
});
</script>
