<script>
// ── All original variables, constants, settings, and functions up to startLevel() remain unchanged ──
const DIFF_DESCS = { /* your original */ };
const DIFF_LABELS = { /* your original */ };
const FELT_COLORS = { /* your original */ };
const CUE_COLORS = { /* your original */ };
let settings = { /* your original with localStorage */ };
// … (all functions: saveSetting, applyMobileMode, toggleMobile, openSettings, closeSettings, setFelt, setCue, selectDiff, continueGame, launchGame, placePracticeBall, startPractice, getLevelProgress, saveLevelProgress, getStarsForLevel, saveGame, loadSave, clearSave, updateContinueBtn, goHome, updateLivesDisplay, ZONE_DATA, getZoneForLevel, getLevelName, getZoneName, getLevelData, buildTable, resizeCanvas, etc.) …

// ── ONLY ONE startLevel() function (duplicate removed) ──
function startLevel() {
  document.getElementById('overlay').classList.add('hidden');
  resizeCanvas();
  const lvlData = getLevelData(G.level);
  G.balls=[]; G.particles=[]; G.combo=0; G.explosion=null; G.phase='idle';
  G._scratchedThisLevel=false; G._levelStartTime=Date.now();
  G.streak=0; G.shotsUsed=0; G.shotBudget=lvlData.shotBudget;
  updateLivesDisplay(); updateStreakDisplay(); updateShotsDisplay();
  document.getElementById('s-lvl').textContent = G.level;
  const _lnEl=document.getElementById('s-levelname');
  if(_lnEl) _lnEl.textContent = getZoneName(G.level)+' · '+getLevelName(G.level);
  Audio.playGame(false);

  G.cue = T.isPortrait
    ? {x:T.ix+Math.round(T.iw/2), y:T.iy+Math.round(T.ih*0.75), vx:0,vy:0,r:BALL_R}
    : {x:T.ix+Math.round(T.iw*0.25),y:T.iy+Math.round(T.ih/2), vx:0,vy:0,r:BALL_R};

  const positions = placeBalls(lvlData.n, G.level, lvlData.hasBombs);

  const shift = settings.earlybombs ? 2 : 0;
  let baseDanger = 0;
  if (difficulty === 'easy') {
    const el = G.level + shift;
    if (el >= 10) baseDanger = 2;
    else if (el >= 8) baseDanger = 2;
    else if (el >= 5) baseDanger = 1;
  } else {
    const el = G.level + shift;
    if (el >= 10) baseDanger = 3;
    else if (el >= 7) baseDanger = 2;
    else if (el >= 4) baseDanger = 1;
  }
  const numDanger = Math.min(lvlData.n - 1, baseDanger);
  const dangerIndices = new Set();
  while (dangerIndices.size < numDanger) dangerIndices.add(Math.floor(Math.random() * lvlData.n));

  positions.forEach((pos,i) => {
    const isBomb = lvlData.hasBombs;
    const isDanger = dangerIndices.has(i);
    const tv = lvlData.t + (Math.random()-0.5)*4;
    G.balls.push({
      x:pos.x, y:pos.y, vx:0,vy:0, r:BALL_R,
      color: isDanger ? '#e8e8e0' : BCOLORS[i % BCOLORS.length],
      isBomb, isDanger,
      timer:tv, maxTimer:tv, id:i,
      potted:false, exploded:false,
      ph:Math.random()*Math.PI*2,
      fuseAngle: Math.random()*Math.PI*2,
      fuseActive: false,
      fuseTimer: 20,
      fuseMaxTimer: 20,
      neverHit: true,
      hitCount: 0
    });
  });

  G.phase='aiming';
  refreshStrip();
}

// ── Improved drawLevelMap() – completed levels now clearly visible ──
function drawLevelMap() {
  const mc = document.getElementById('map-canvas');
  mc.width  = Math.min(window.innerWidth - 24, 600);
  mc.height = Math.max(window.innerHeight - 150, 300);
  const c = mc.getContext('2d');
  const W = mc.width, H = mc.height;
  const prog = getLevelProgress(_mapDiff);
  const nodes = getMapNodes();
  const now = Date.now() / 1000;

  // Background zones (your original code)
  const rowH2 = H / 5;
  ZONE_DATA.forEach((zone, zi) => {
    const zy = zi * rowH2;
    const zg = c.createLinearGradient(0,zy,W,zy+rowH2);
    zg.addColorStop(0,zone.bg[0]); zg.addColorStop(1,zone.bg[1]);
    c.fillStyle=zg; c.fillRect(0,zy,W,rowH2);
    // (your original zone banner, name, decor, etc. — unchanged)
  });

  // Nodes with strong progress feedback
  nodes.forEach((node) => {
    const lvlData = prog[node.lvl] || {};
    const isCompleted = lvlData.completed;
    const isCurrent = node.lvl === G.level;
    const isUnlocked = node.lvl===1 || isCompleted || (_mapDiff===difficulty && node.lvl<=G.level);
    const r = node.r;

    c.save(); c.translate(node.x, node.y);

    if (isCompleted) { c.shadowBlur = 18; c.shadowColor = '#ffcc00'; }
    if (isCurrent) { c.shadowBlur = 25; c.shadowColor = '#ff6b00'; }

    c.beginPath();
    for (let h = 0; h < 6; h++) {
      const ha = h * Math.PI / 3 - Math.PI / 6;
      h === 0 ? c.moveTo(Math.cos(ha) * r, Math.sin(ha) * r) : c.lineTo(Math.cos(ha) * r, Math.sin(ha) * r);
    }
    c.closePath();
    c.fillStyle = isCompleted ? '#1a3a2a' : '#0a1a0a';
    c.fill();
    c.strokeStyle = isCompleted ? '#ffcc00' : (isUnlocked ? '#00ff88' : '#1a2a1a');
    c.lineWidth = isCompleted ? 4 : 2;
    c.stroke();

    c.fillStyle = isCompleted ? '#ffcc00' : (isUnlocked ? '#00ff88' : '#006633');
    c.font = `bold ${r*0.65}px monospace`;
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.fillText(node.lvl, 0, 0);

    if (isCompleted && lvlData.stars) {
      const starStr = '★'.repeat(lvlData.stars) + '☆'.repeat(3 - lvlData.stars);
      c.fillStyle = lvlData.stars === 3 ? '#ffcc00' : '#aa8800';
      c.font = `${r*0.45}px sans-serif`;
      c.fillText(starStr, 0, r + 18);
    }

    if (isCurrent) {
      c.fillStyle = '#ff6b00';
      c.font = `bold ${r*0.5}px monospace`;
      c.fillText('▶ HERE', 0, -r - 22);
    }

    c.restore();
  });

  // (All your original connection lines, bomb decorations, cursor, etc. remain exactly as you wrote them)
}

// ── Auto-return to map after level complete ──
function checkEnd() {
  const alive = G.balls.filter(b => !b.potted && !b.exploded);
  if (alive.length === 0) {
    const wasScratched = G._scratchedThisLevel;
    const stars = getStarsForLevel(G.level, wasScratched, G.shotsUsed, G.shotBudget, 0);
    saveLevelProgress(G.level, stars, G.score);

    document.getElementById('overlay').classList.add('hidden');
    _mapJustCleared = G.level;
    showLevelMap(G.level);   // ← automatic map return
  }
}

</script>
